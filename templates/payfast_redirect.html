<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting to PayFast...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #FEF9FB; color: #333; }
    .msg { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #F8C8DF; border-top-color: #D4609A;
               border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Redirecting you to PayFast to complete payment...</p>
  </div>
  <form id="pf" action="{{ payfast_url }}" method="POST" style="display:none">
    {% for key, value in data.items() %}
    <input type="hidden" name="{{ key }}" value="{{ value }}" />
    {% endfor %}
  </form>
  <script>document.getElementById('pf').submit();</script>
</body>
</html>
